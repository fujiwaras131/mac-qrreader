<!DOCTYPE html>
<html lang="ja">
<head><meta charset="UTF-8"/></head>
<body style="font-family: -apple-system, sans-serif; padding: 16px;">
<h2>QR Reader へようこそ</h2>
<p>このインストーラーは次のコンポーネントをインストールします：</p>
<ul>
  <li>QR リーダーデーモン（<code>/usr/local/libexec/com.company.qrreader/</code>）</li>
  <li>自動起動エージェント（<code>/Library/LaunchAgents/com.company.qrreader.plist</code>）</li>
</ul>
<p>インストール後に <strong>システム設定 → プライバシーとセキュリティ → アクセシビリティ</strong> で
<code>qr-reader-daemon</code> の入力監視を許可してください。</p>
<p style="font-size:12px; color:#888;">macOS 12–14 対応 ／ 社内配布用</p>
</body>
</html>
