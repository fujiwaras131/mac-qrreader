name: Build QR Reader PKG

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'PKG version (e.g. 0.1.0)'
        required: false
        default: '0.1.0'

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV
          else
            echo "VERSION=0.1.0" >> $GITHUB_ENV
          fi

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Make scripts executable
        working-directory: mac-reader
        run: chmod +x Scripts/build-pkg.sh Scripts/preinstall Scripts/postinstall Scripts/uninstall.sh

      - name: Build PKG
        working-directory: mac-reader
        run: ./Scripts/build-pkg.sh

      - name: Upload PKG artifact
        uses: actions/upload-artifact@v4
        with:
          name: qr-reader-${{ env.VERSION }}-pkg
          path: mac-reader/dist/qr-reader-${{ env.VERSION }}.pkg
          retention-days: 30

      - name: Create GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: mac-reader/dist/qr-reader-${{ env.VERSION }}.pkg
          generate_release_notes: false
          name: QR Reader ${{ env.VERSION }}
          body: |
            ## インストール方法
            1. `qr-reader-${{ env.VERSION }}.pkg` をダウンロード
            2. ダブルクリックしてインストール
            3. システム設定 → プライバシーとセキュリティ → アクセシビリティで `qr-reader-daemon` を許可
